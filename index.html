        // --- Web Audio API ---
        let audioCtx, oscillator, gainNode, isMusicPlaying = false;
        function toggleMusic() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!isMusicPlaying) {
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(126.22, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 2);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                document.getElementById('toggle-music').innerText = "關閉音效 🔇";
                isMusicPlaying = true;
            } else {
                if (gainNode) gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                setTimeout(() => { if (oscillator) oscillator.stop(); }, 1000);
                document.getElementById('toggle-music').innerText = "開啟頌磬 🎵";
                isMusicPlaying = false;
            }
        }

        async function callGemini(prompt, sys, isJson = false) {
    if (!apiKey || apiKey === "") {
        alert("請輸入有效的 API Key！");
        return;
    }
    // 使用更穩定的 1.5 Flash 版本
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    
    const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: sys }] },
        generationConfig: isJson ? { responseMimeType: "application/json" } : {}
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if (result.error) {
            console.error("API Error:", result.error.message);
            throw new Error(result.error.message);
        }
        return result.candidates[0].content.parts[0].text;
    } catch (e) {
        console.error("Connection Failed:", e);
        throw e;
    }
}

            document.getElementById(`view-${view}`).classList.remove('hidden');

            if (view === 'relax') startRelax(); else stopRelax();

            const container = document.getElementById('list-container');

                card.className = "scenario-card p-4 shadow-sm flex justify-between items-center";

        function openScene(s) {
            currentS = s; stress = 50; guilt = 30;
            document.getElementById('s-title').innerText = s.title;
            document.getElementById('s-desc').innerText = s.desc;
            const cDiv = document.getElementById('s-choices');
            cDiv.innerHTML = '';
            s.choices.forEach(c => {

                b.onclick = () => handleChoice(c);
                cDiv.appendChild(b);
            });
            updateBars(); setView('scene');

            stress = Math.max(10, Math.min(100, stress + (c.s || 0)));

            document.getElementById('modal-msg').innerText = c.msg;

            document.getElementById('modal').classList.remove('hidden');

            document.getElementById('bar-guilt').style.width = `${guilt}%`;
        }

        function closeModal(goHome) {
            document.getElementById('modal').classList.add('hidden');
            if (goHome) { solved++; document.getElementById('solved-count').innerText = solved; setView('list'); }
        }

        async function fetchNewShort() {
            const ldr = document.getElementById('short-loader');
            ldr.classList.remove('hidden');
            const sys = "你是一位專為香港 SEN 家長提供情緒支持的 AI。請生成 JSON：{\"tag\":\"類別\",\"content\":\"廣東話內容(30字內)\",\"author\":\"署名\"}";
            try {
                const res = await callGemini("生成一則心靈鼓勵", sys, true);
                const data = JSON.parse(res);
                document.getElementById('short-content').innerText = data.content;
                document.getElementById('short-tag').innerText = data.tag;
                document.getElementById('short-author').innerText = data.author;
            } catch (e) { document.getElementById('short-content').innerText = "你已經做得好好，休息下先。"; }
            finally { ldr.classList.add('hidden'); }
        }

        document.getElementById('ai-gen-btn').onclick = async function() {
            const input = document.getElementById('ai-input').value;
            if (!input.trim()) return;
            const btn = this; const ldr = document.getElementById('gen-loader'); const txt = document.getElementById('gen-btn-text');
            btn.disabled = true; ldr.classList.remove('hidden'); txt.innerText = "專家構思中...";
            const sys = `你是一位香港 SEN 專家。請生成 JSON 場景：{"cat":"分類","title":"標題","desc":"描述","choices":[{"t":"反應","msg":"分析","s":20,"g":40},{"t":"反應","msg":"分析","s":-30,"g":0},{"t":"反應","msg":"分析","s":10,"g":20}],"color":"#HEX"}`;
            try {
                const res = await callGemini(input, sys, true);
                openScene(JSON.parse(res));
            } catch (e) { alert("專家網絡忙碌。"); }
            finally { btn.disabled = false; ldr.classList.add('hidden'); txt.innerText = "生成 AI 專屬練習"; }
        };

        document.getElementById('ask-ai-btn').onclick = async function() {
            const btn = this, ldr = document.getElementById('chat-loader'), resA = document.getElementById('ai-chat-res');
            btn.disabled = true; ldr.classList.remove('hidden'); document.getElementById('ai-chat-section').classList.remove('hidden');
            const sys = "你是一位香港 SEN 專家。請用廣東話提供具體、可執行的建議。150字內。";
            try {
                resA.innerText = await callGemini(`場景：${currentS.title}。情況：${currentS.desc}。請給我具體點做。`, sys);
            } catch (e) { resA.innerText = "連線超時。"; }
            finally { btn.disabled = false; ldr.classList.add('hidden'); }
        };

        let rActive = false, rRad = 60, rGrow = true;
        const rCanvas = document.getElementById('relaxCanvas'), rCtx = rCanvas.getContext('2d');
        function startRelax() {
            rActive = true;
            (function anim() {
                if(!rActive) return;
                rCtx.clearRect(0, 0, 240, 240);
                const g = rCtx.createRadialGradient(120, 120, rRad/3, 120, 120, rRad);
                g.addColorStop(0, '#eef2ff'); g.addColorStop(1, '#6366f1');
                rCtx.beginPath(); rCtx.arc(120, 120, rRad, 0, Math.PI*2); rCtx.fillStyle = g; rCtx.fill();
                if(rGrow) { rRad += 0.25; if(rRad>=100) rGrow=false; }
                else { rRad -= 0.18; if(rRad<=60) rGrow=true; }
                requestAnimationFrame(anim);
            })();
            callGemini("我是一個很疲累的香港 SEN 家長，請寫一句溫馨廣東話鼓勵（25字內）。", "支持者").then(q => {
                const qa = document.getElementById('ai-quote');
                qa.innerText = q || "你已經做得很好，休息一下先。";
                qa.classList.remove('hidden');
            });
        }
        function stopRelax() { rActive = false; if(isMusicPlaying) toggleMusic(); }

        document.getElementById('toggle-music').onclick = toggleMusic;
        renderList();
    </script>
</body>
